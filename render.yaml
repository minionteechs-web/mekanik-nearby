# Render Blueprint — connect GitHub repo at root, this file deploys the API
services:
  - type: web
    name: mekanik-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: PUBLIC_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
